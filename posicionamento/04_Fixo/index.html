<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posicionamento fixed</title>
    <style>
        .div_grande{
			background-color: aqua;
            position: fixed;
            top: 0px;  
        }
        .div_pequena{
			background-color: yellow;
            position: fixed;
            left: 100px;   
			bottom: 10px;			
        }
    </style>
</head>
<body>
    <div class="div_grande">
        Isto é uma div
        <div class="div_pequena">
            Isto é outra div
        </div>
    </div>

    <div class="div_grande">
        Isto é uma div
        <div class="div_pequena">
            Isto é outra div
        </div>
    </div>
</body>
</html>
