<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*botão das opções*/
        .dropbtn {
            background-color: #04AA6D;
            color: white;
            padding: 16px;
            font-size: 16px;
            border: none;
        }
        /*permite ficar lado a lado com outros elementos*/
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;  /*esconde as opções*/
            position: absolute;
            background-color: #f1f1f1;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1;
        }
        /*cor das opções*/
        .dropdown-content a {
            color: black;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
        }
        /*comportamento quando o rato passa por cima*/
        /*cor das opções */
        .dropdown-content a:hover {background-color: #ddd;}
        /*abre as opções*/
        .dropdown:hover .dropdown-content {display: block;}
        /*muda a cor do botão*/
        .dropdown:hover .dropbtn {background-color: #3e8e41;}
    </style>
</head>
<body>
    Lista de opções 
    <div class="dropdown">
        <button class="dropbtn">Dropdown</button>
        <div class="dropdown-content">
          <a href="#">Link 1</a>
          <a href="#">Link 2</a>
          <a href="#">Link 3</a>
        </div>
      </div>
      Escolha uma
      <ul>
        <li>opções que devem ficar por baixo</li>
      </ul>
</body>
</html>
