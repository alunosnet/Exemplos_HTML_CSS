<!DOCTYPE html>
<html>
<head>
<style>
    div.foto {
    width: 250px;
    box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
    text-align: center;
    float: left;
    margin: 5px;
    }

    div.container {
    padding: 10px;
    }
</style>
</head>
<body>

<h1>Create Polaroid Images</h1>

<p>The box-shadow property can be used to create polaroid images:</p>

<div class="foto">
  <img src="Imagens/img1.jpg" alt="Imagem 1" style="width:100%">
  <div class="container">
    <p>Minha Foto</p>
  </div>
</div>

<div class="foto">
  <img src="Imagens/img2.jpg" alt="Imagem 2" style="width:100%">
  <div class="container">
    <p>Minha Foto</p>
  </div>
</div>

<div class="foto">
    <img src="Imagens/img3.jpg" alt="Imagem 3" style="width:100%">
    <div class="container">
      <p>Minha Foto</p>
    </div>
  </div>
  
</body>
</html>
