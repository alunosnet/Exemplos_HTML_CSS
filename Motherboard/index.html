<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #voltar{
            position: fixed;
            bottom: 10px;
            right: 10px;
        }
        #voltar a{
            background-color: white;
            text-decoration: none;
            color: red;
            padding: 10px 10px 10px 10px;
            border: 1px solid black;
            border-radius: 5px;
            opacity: 0.75;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }
    </style>
</head>
<body>
    <div id="voltar">
        <a href="#inicio">Voltar</a>
    </div>
    <h1 id="inicio">Componentes de um computador</h1>
    <h2>Motherboard</h2>
    <img src="motherboard.png" alt="Motherboard" usemap="#computadormap" />
    <map name="computadormap">
        <area title="CPU" shape="rect" coords="420,240,570,420" alt="CPU" href="#cpu">
        <area title="RAM" shape="rect" coords="668,57,745,575" alt="CPU" href="#ram">
        <area title="Chipset" shape="circle" coords="750,750,75" alt="Chipset" href="#chipset">
        <area title="Nvme" shape="rect" coords="220,640,524,710" alt="Nvme" href="#nvme">
        <area title="Sata" shape="rect" coords="870,640,930,840" alt="Sata" href="#ssd">
    </map>
    <hr>
    <div id="cpu">
        <h2>Cpu</h2>
        <img src="cpu.png" alt="Processador" width="90%">
        <p>O processador</p>
    </div>
    <hr>
    <div id="ram">
        <h2>Memória RAM</h2>
        <img src="ram.png" alt="Memória RAM" width="90%">
        <p>Memória ram</p>
    </div>
    <hr>
    <div id="ssd">
        <h2>Disco SSD</h2>
        <img src="ssd.png" alt="Disco SSD" width="90%">
        <p>Disco SSD</p>
    </div>
    <hr>
    <div id="chipset">
        <h2>Chipset</h2>
        <img src="chipset.png" alt="Chipset" width="90%">
        <p>Chipset é responsável por controlar a comunicação</p>
    </div>
    <hr>
    <div id="nvme">
        <h2>Disco Nvme</h2>
        <img src="nvme.png" alt="Nvme" width="90%">
        <p>Disco Nvme</p>
    </div>
</body>
</html>
