<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0px;
        }
        .vermelho{
            width:400px;
            height:400px;
            background-color: red;
            position: absolute;
            top: 0px;
            left: 200px;
            z-index: -1;
        }
        .amarelo{
            width: 200px;
            height: 200px;
            background-color: yellow;
            border-radius: 100px;
            position: absolute;
            top: 100px;
            left: 100px;
        }
        .verde{
            width: 200px;
            height: 400px;
            background-color: green;
            position: absolute;
            top: 0px;
        }
        .bandeira{
            position: absolute;
            top: 200px;
            left: 200px;
        }
    </style>
</head>
<body>
    <div class="bandeira">
        <div class="verde"></div>
        <div class="amarelo"></div>
        <div class="vermelho"></div>
    </div>
</body>
</html>
