<!DOCTYPE html>
<html>
<head>
<style>
.image-container {
    width: 300px;
    height: 200px;
    overflow: hidden;
    position: relative;
}

.image-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s ease;
}

.image-container:hover img {
    transform: scale(1.2);
}
</style>
</head>
<body>
<div class="image-container">
    <img src="https://fastly.picsum.photos/id/0/5000/3333.jpg?hmac=_j6ghY5fCfSD6tvtcV74zXivkJSPIfR9B8w34XeQmvU" alt="Imagem com efeito zoom">
</div>
</body>
</html>
