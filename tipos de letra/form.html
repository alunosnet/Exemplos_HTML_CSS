<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="sucesso.html">
        <label for="input_nome">Nome:</label>
        <input type="text" id="input_nome" required placeholder="Escreva o seu nome completo">
        <br>
        <label for="input_email">Email:</label>
        <input type="email" id="input_email" required placeholder="email@qqcoisa.pt">
        <br>
        <label for="select_marca">Marca do seu carro:</label>
        <select id="select_marca" size="3">
            <option value="1">Volvo</option>
            <option value="2">BMW</option>
            <option value="3">Ford</option>
            <option value="4">Ferrari</option>
            <option value="5">Audi</option>
        </select>
        <br>
        <label for="input_data">Data Nascimento:</label>
        <input type="date" id="input_data" required>
        <br>
        <label for="checkbox_aceitar">Aceitar os termos de serviço</label>
        <input type="checkbox" id="checkbox_aceitar">
        <br>
        <label for="fotografia">Fotografia:</label>
        <input type="file" id="fotografia">
        <br>
        <label for="tipo_computador">Tipo de computador:</label>
        <input type="radio" id="tipo_computador_portatil" name="tipo_computador">Portátil
        <br>
        <input type="radio" id="tipo_computador_desktop" name="tipo_computador">Desktop
        <br>
        <input type="submit" value="Registar">
        <input type="reset" value="Limpar">
    </form>
</body>
</html>
