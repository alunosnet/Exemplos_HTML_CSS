<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            color: brown;
            background-color: plum;
            border-radius: 5px;
            margin: 10px 0px 10px 0px;
            padding: 10px 10px 10px 50px;
        }
        .centrado{
            text-align: center;
        }
        label{
            width: 180px;
            display: inline-block;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 10px 0px 10px 10px;
        }
        input{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 5px 5px 5px 5px;
        }
        input[type=submit]{
            background-color: greenyellow;
            border: 1px solid green;
            width: 100px;
            margin: 10px 10px 10px 10px;
        }
        /*mudar a cor de fundo quando o rato passa sobre a input*/
        input:hover{
            background-color: aqua;
        }
        /*mudar a cor de fundo quando está selecionada*/
        input:focus{
            background-color: rgba(11, 11, 91, 0.75);
        }
        /*mudar a cor do botão submit quando o rato passa sobre ele*/
        #submit:hover{
            background-color: green;
        }
        form{
            border: 1px solid black;
            padding: 10px 10px 10px 10px;
        }
        select{
            border: none;
        }
        select:hover{
            background-color: aqua;
        }
        option:hover{
            background-color: green;
        }
    </style>
</head>
<body>
    <h1 >A minha escola</h1>
    <div class="centrado">
        <h2>Mapa</h2>
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d12106.931738548368!2d-7.9048208!3d40.6578171!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd23364efce139bb%3A0xe456f253870748dd!2sEscola%20Secund%C3%A1ria%20Em%C3%ADdio%20Navarro!5e0!3m2!1spt-PT!2spt!4v1667232094313!5m2!1spt-PT!2spt" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>

    <h2>Registo de utilizador</h2>
    <form action="obrigado.html">
        <label for="email">Email:</label><input id="email" type="email" required placeholder="email@dominio.com">
        <br><label for="password">Password:</label><input id="password" type="password" required>
        <br><label for="nome">Nome:</label><input id="nome" type="text" required>
        <br><label for="telefone">Telefone:</label><input id="telefone" type="tel" >
        <br><label for="morada">Morada:</label><input id="morada" type="text" required>
        <br><label for="cp">Código Postal:</label><input id="cp" type="text" required placeholder="####-###">
        <br><label>Género:</label> F<input id="f" type="radio" name="genero"> 
                    M<input id="m" type="radio" name="genero">
        <br><label for="termos">Aceitar termos de utilizador</label> <input type="checkbox">
        <br><label for="foto">Fotografia</label> <input id="foto" type="file">
        <br><label for="data">Data Nascimento:</label> <input id="data" type="date">
        <br><label for="marca">Seleciona a Marca do seu carro:</label>
        <br>
        <select id="marca" size="3">
            <option>Volvo</option>
            <option>Ford</option>
            <option>BMW</option>
            <option>Renault</option>
            <option>Mercedes</option>
            <option>Audi</option>
        </select>
        <br><input id="submit" type="submit" value="Registar" />
    </form>
</body>
</html>
